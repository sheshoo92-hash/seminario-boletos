<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultado del pago</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card ticket">
  <h1 id="title">Procesando...</h1>
  <p id="msg" class="muted"></p>
  <div id="spinner"></div>
  <a id="verBoleto" class="primary" style="display:none; text-decoration:none; display:block; text-align:center; padding:14px; background:#1c3a6e; color:#fff; border-radius:10px; margin-top:18px;">Ver mi boleto</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const status = params.get('status');

const titleEl = document.getElementById('title');
const msgEl = document.getElementById('msg');
const link = document.getElementById('verBoleto');

if (status === 'success') {
  titleEl.textContent = '¡Pago recibido!';
  msgEl.textContent = 'Estamos confirmando tu pago con Mercado Pago. Esto puede tardar unos segundos.';
} else if (status === 'pending') {
  titleEl.textContent = 'Pago pendiente';
  msgEl.textContent = 'Tu pago está en proceso. Cuando se confirme podrás ver tu boleto.';
} else {
  titleEl.textContent = 'Pago no completado';
  msgEl.textContent = 'No se pudo procesar tu pago. Puedes intentarlo de nuevo.';
}

if (code) {
  link.href = '/ticket.html?code=' + code;
  link.style.display = 'block';
  link.textContent = 'Ver estado de mi boleto';
}
</script>
</body>
</html>
