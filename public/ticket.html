<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Boleto</title>
<link rel="stylesheet" href="style.css">
<style>
#downloadBtn {
  margin-top:14px; width:100%; padding:12px; background:#0a8f5b; color:#fff;
  border:none; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer;
}
#downloadBtn:hover { background:#078050; }
.tipo-badge {
  display:inline-block; margin:6px 0; padding:4px 12px; border-radius:20px;
  font-size:0.8rem; font-weight:700; color:#fff;
}
.tipo-empresario     { background:#1c3a6e; }
.tipo-nuevo_empresario { background:#0a8f5b; }
.tipo-invitado       { background:#a86a00; }
</style>
</head>
<body>
<div class="card ticket" id="ticketCard">
  <h1 id="eventName">Cargando...</h1>
  <p class="subtitle" id="eventDate" style="display:none;"></p>
  <div id="content"></div>
</div>

<script>
const code = new URLSearchParams(window.location.search).get('code');
let data = {};
const tipoLabel = { empresario: 'Empresario', nuevo_empresario: 'Nuevo Empresario', invitado: 'Invitado' };

async function load() {
  if (!code) {
    document.getElementById('content').innerHTML = '<p class="error" style="display:block">Boleto no especificado.</p>';
    return;
  }
  const res = await fetch('/api/ticket/' + code);
  data = await res.json();
  if (!res.ok) {
    document.getElementById('content').innerHTML = '<p class="error" style="display:block">' + (data.error || 'Boleto no encontrado') + '</p>';
    return;
  }

  document.getElementById('eventName').textContent = data.eventName;
  if (data.eventDate) {
    const d = document.getElementById('eventDate');
    d.textContent = data.eventDate;
    d.style.display = 'block';
  }

  const tipo = data.ticket_type || 'empresario';
  let html = '';
  if (data.ticket_number) {
    html += '<p class="muted" style="font-size:0.8rem; margin-bottom:4px;">Boleto #' + data.ticket_number + '</p>';
  }
  html += '<span class="tipo-badge tipo-' + tipo + '">' + (tipoLabel[tipo] || tipo) + '</span>';
  if (data.early_bird) html += ' <span class="tipo-badge" style="background:#c07000;">Early Bird 🎉</span>';
  html += '<p><strong>' + data.full_name + '</strong></p>';
  if (data.platino)   html += '<p class="muted">Platino: ' + data.platino + '</p>';
  if (data.esmeralda) html += '<p class="muted">Esmeralda: ' + data.esmeralda + '</p>';
  if (data.diamante)  html += '<p class="muted">Diamante: ' + data.diamante + '</p>';
  if (data.auspicio_numero) html += '<p class="muted">N° Empresario: ' + data.auspicio_numero + '</p>';

  if (data.payment_status === 'pagado') {
    html += '<div><img src="' + data.qr + '" width="220" height="220" alt="QR del boleto"></div>';
    if (data.early_bird && data.max_checkins === 2) {
      const usados = data.checked_in_count || 0;
      if (usados === 0) {
        html += '<div class="status-pill" style="background:#e6f0ff; color:#1c3a6e; margin-top:8px;">🎟 Válido para 2 escaneos:<br>① Ticket Holder (día de compra) · ② Día del evento</div>';
      } else if (usados === 1) {
        html += '<div class="status-pill status-warn">✔ 1er escaneo usado (Ticket Holder)<br>Falta: escaneo del día del evento</div>';
      }
    }
    html += '<p class="muted">Presenta este código QR en la entrada.</p>';
    if (data.checked_in_count >= data.max_checkins) {
      html += '<div class="status-pill status-warn">Ya se registró tu entrada (' + (data.checked_in_at || '') + ')</div>';
    } else {
      html += '<div class="status-pill status-ok">Pago confirmado · Acceso válido</div>';
    }
    html += '<button id="downloadBtn" onclick="descargarBoleto()">⬇ Guardar boleto como imagen</button>';
  } else {
    html += '<div class="status-pill status-bad">Pago pendiente</div>';
    html += '<p class="muted">Tu boleto aparecerá aquí en cuanto se confirme el pago.</p>';
    html += '<button class="primary" onclick="load()">Actualizar</button>';
  }

  document.getElementById('content').innerHTML = html;
}

async function descargarBoleto() {
  const btn = document.getElementById('downloadBtn');
  btn.textContent = 'Generando imagen...';
  btn.disabled = true;
  try {
    const W = 640, pad = 40;
    const tipoLabels = { empresario: 'Empresario', nuevo_empresario: 'Nuevo Empresario', invitado: 'Invitado' };
    const tipoColors = { empresario: '#1c3a6e', nuevo_empresario: '#0a8f5b', invitado: '#a86a00' };

    // Calcular altura dinámica
    const lines = [];
    if (data.ticket_number) lines.push({ text: 'Boleto #' + data.ticket_number, size: 14, color: '#888', bold: false });
    lines.push({ text: data.eventName, size: 22, color: '#1c3a6e', bold: true });
    if (data.eventDate) lines.push({ text: data.eventDate, size: 15, color: '#555', bold: false });
    lines.push({ text: data.full_name, size: 20, color: '#111', bold: true });
    if (data.platino)   lines.push({ text: 'Platino: ' + data.platino, size: 14, color: '#555', bold: false });
    if (data.esmeralda) lines.push({ text: 'Esmeralda: ' + data.esmeralda, size: 14, color: '#555', bold: false });
    if (data.diamante)  lines.push({ text: 'Diamante: ' + data.diamante, size: 14, color: '#555', bold: false });
    if (data.auspicio_numero) lines.push({ text: 'N° Empresario: ' + data.auspicio_numero, size: 14, color: '#555', bold: false });

    const qrSize = 200;
    const H = pad + 30 + lines.length * 28 + 20 + qrSize + 20 + 36 + pad;

    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    // Fondo blanco con borde redondeado simulado
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);

    // Borde superior de color
    ctx.fillStyle = tipoColors[data.ticket_type] || '#1c3a6e';
    ctx.fillRect(0, 0, W, 8);

    // Líneas de texto
    let y = pad + 8;
    for (const l of lines) {
      ctx.font = (l.bold ? 'bold ' : '') + l.size + 'px system-ui, -apple-system, sans-serif';
      ctx.fillStyle = l.color;
      ctx.textAlign = 'center';
      ctx.fillText(l.text, W / 2, y + l.size);
      y += l.size + 10;
    }

    // Badge tipo + early bird
    const badgeY = y + 10;
    const tipo = data.ticket_type || 'empresario';
    const badgeColor = tipoColors[tipo] || '#1c3a6e';
    const badgeText = tipoLabels[tipo] || tipo;
    ctx.font = 'bold 13px system-ui, sans-serif';
    const bw = ctx.measureText(badgeText).width + 24;
    ctx.fillStyle = badgeColor;
    roundRect(ctx, W/2 - bw/2, badgeY, bw, 26, 13);
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(badgeText, W/2, badgeY + 18);
    let badgeX = W/2 + bw/2 + 8;
    if (data.early_bird) {
      const ebText = 'Early Bird 🎉';
      ctx.font = 'bold 13px system-ui, sans-serif';
      const ebw = ctx.measureText(ebText).width + 24;
      ctx.fillStyle = '#c07000';
      roundRect(ctx, badgeX, badgeY, ebw, 26, 13);
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'left';
      ctx.fillText(ebText, badgeX + 12, badgeY + 18);
    }
    y = badgeY + 36;

    // QR
    const qrImg = new Image();
    qrImg.src = data.qr;
    await new Promise(r => { qrImg.onload = r; qrImg.onerror = r; });
    ctx.drawImage(qrImg, (W - qrSize) / 2, y, qrSize, qrSize);
    y += qrSize + 10;

    // Pie
    ctx.font = '12px system-ui, sans-serif';
    ctx.fillStyle = '#888';
    ctx.textAlign = 'center';
    ctx.fillText('Presenta este código QR en la entrada', W/2, y + 12);
    y += 28;

    // Badge "Pago confirmado · Acceso válido"
    const statusText = '✔  Pago confirmado · Acceso válido';
    ctx.font = 'bold 13px system-ui, sans-serif';
    const sw = ctx.measureText(statusText).width + 32;
    ctx.fillStyle = '#d4edda';
    roundRect(ctx, (W - sw) / 2, y, sw, 30, 8);
    ctx.fillStyle = '#155724';
    ctx.textAlign = 'center';
    ctx.fillText(statusText, W/2, y + 20);

    // Descargar
    const link = document.createElement('a');
    link.download = 'boleto-' + (data.ticket_number || code) + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();

    btn.textContent = '✔ Imagen descargada';
    btn.style.background = '#1c3a6e';
    setTimeout(() => { btn.textContent = '⬇ Guardar boleto como imagen'; btn.disabled = false; btn.style.background = ''; }, 3000);
  } catch(e) {
    console.error(e);
    btn.textContent = '⬇ Guardar boleto como imagen';
    btn.disabled = false;
    alert('Error: ' + e.message);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

load();
setInterval(() => { if (document.querySelector('.status-bad')) load(); }, 5000);
</script>
</body>
</html>
